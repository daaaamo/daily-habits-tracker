<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0f1923"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Daily Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');
:root{--bg:#0d1810;--bg2:#111f16;--green:#7a9e8a;--green-light:#a8d4b8;--gold:#c4a870;--gold-light:#e8c882;--orange:#c47a5a;--text:#e8e0d0;--text-dim:#8a9e92;--text-faint:#4a6a5a;--border:rgba(255,255,255,0.07);--card:rgba(255,255,255,0.03);--safe-top:env(safe-area-inset-top,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:100px;overscroll-behavior:none;}

#header{padding:calc(var(--safe-top) + 28px) 20px 16px;background:linear-gradient(180deg,rgba(0,0,0,.35) 0%,transparent 100%);border-bottom:1px solid var(--border);}
#header .eyebrow{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--green);margin-bottom:4px;}
#header .date-label{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);margin-bottom:14px;}
.stat-row{display:flex;gap:8px;}
.stat-card{flex:1;background:rgba(122,158,138,.1);border:1px solid rgba(122,158,138,.15);border-radius:10px;padding:8px 10px;text-align:center;}
.stat-card.gold{background:rgba(184,148,96,.1);border-color:rgba(184,148,96,.15);}
.stat-card.orange{background:rgba(196,122,90,.1);border-color:rgba(196,122,90,.15);}
.stat-card .num{font-family:'DM Serif Display',serif;font-size:20px;color:var(--green-light);display:block;}
.stat-card.gold .num{color:var(--gold-light);}
.stat-card.orange .num{color:#e8a88a;}
.stat-card .lbl{font-size:10px;color:var(--green);letter-spacing:1px;}
.stat-card.gold .lbl{color:var(--gold);}
.stat-card.orange .lbl{color:var(--orange);}

#tabs{display:flex;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;background:var(--bg);backdrop-filter:blur(12px);}
#tabs button{flex:1;padding:13px 4px;border:none;background:transparent;color:var(--text-faint);cursor:pointer;font-size:10px;letter-spacing:2px;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .2s;font-family:'DM Sans',sans-serif;}
#tabs button.active{color:var(--green-light);border-bottom-color:var(--green);}

.view{display:none;padding:20px 16px;max-width:500px;margin:0 auto;}
.view.active{display:block;}

.section{margin-bottom:24px;}
.section-head{margin-bottom:10px;}
.section-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--green);}
.section-title.gold{color:var(--gold);}
.section-sub{font-size:10px;color:var(--text-faint);margin-top:2px;}
.section-body{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}

.check-row{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;width:100%;background:none;border-left:none;border-right:none;border-top:none;text-align:left;}
.check-row:last-child{border-bottom:none;}
.check-row:active{background:rgba(255,255,255,.03);}
.check-box{width:22px;height:22px;border-radius:5px;flex-shrink:0;border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px;font-weight:bold;color:var(--bg);}
.check-box.g{background:var(--green);border-color:var(--green);}
.check-box.gd{background:var(--gold);border-color:var(--gold);}
.check-box.o{background:var(--orange);border-color:var(--orange);}
.check-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.check-label{font-size:14px;color:var(--text-dim);transition:color .2s;flex:1;}
.check-row.done .check-label{color:var(--text);}

.anger-pips{display:flex;gap:5px;padding:0 14px 12px 50px;align-items:center;}
.pip{width:32px;height:5px;border-radius:3px;background:rgba(255,255,255,.08);transition:background .3s;}
.pip.filled{background:var(--orange);}
.pip-label{font-size:10px;color:var(--text-faint);margin-left:6px;}

.save-btn{width:100%;padding:15px;background:linear-gradient(135deg,rgba(122,158,138,.2),rgba(184,148,96,.1));border:1px solid rgba(122,158,138,.3);border-radius:12px;color:var(--text);font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .3s;font-family:'DM Sans',sans-serif;margin-top:4px;}
.save-btn.saved{background:rgba(122,158,138,.25);color:var(--green-light);}

/* CENTERING LAUNCH */
.center-launch{width:100%;padding:16px;margin-bottom:22px;background:linear-gradient(135deg,rgba(122,158,138,.1),rgba(122,158,138,.04));border:1px solid rgba(122,158,138,.2);border-radius:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:background .2s;}
.center-launch:active{background:rgba(122,158,138,.18);}
.cl-icon{width:48px;height:48px;border-radius:50%;background:rgba(122,158,138,.12);border:1px solid rgba(122,158,138,.25);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.cl-text{flex:1;}
.cl-title{font-size:15px;color:var(--text);margin-bottom:2px;}
.cl-sub{font-size:11px;color:var(--text-faint);}
.cl-arrow{font-size:16px;color:var(--green);opacity:.5;}

/* HISTORY */
.history-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.history-top{display:flex;justify-content:space-between;align-items:center;}
.history-date{font-size:13px;color:var(--text);margin-bottom:3px;}
.history-sub{font-size:10px;color:var(--text-faint);letter-spacing:1px;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-faint);font-size:14px;line-height:1.8;}

/* WEEK REPORT */
.report-header{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);margin-bottom:4px;}
.report-range{font-size:11px;color:var(--text-faint);letter-spacing:2px;margin-bottom:20px;}
.report-score-ring{width:100px;height:100px;border-radius:50%;background:conic-gradient(var(--green) calc(var(--pct) * 1%),rgba(255,255,255,.06) 0%);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 30px rgba(122,158,138,.2);}
.report-score-inner{width:78px;height:78px;border-radius:50%;background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.report-score-num{font-family:'DM Serif Display',serif;font-size:26px;color:var(--green-light);line-height:1;}
.report-score-lbl{font-size:9px;color:var(--green);letter-spacing:1px;}
.report-section{margin-bottom:20px;}
.report-section-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.bar-label{font-size:11px;color:var(--text-dim);width:150px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;background:var(--green);transition:width .5s;}
.bar-fill.gold{background:var(--gold);}
.bar-fill.mid{background:var(--gold);}
.bar-fill.low{background:var(--orange);}
.bar-pct{font-size:10px;color:var(--text-faint);width:32px;text-align:right;}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.week-nav button{background:var(--card);border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:16px;font-family:'DM Sans',sans-serif;}
.week-nav .week-label{font-size:12px;color:var(--text-dim);}
.ai-insight{background:rgba(122,158,138,.06);border:1px solid rgba(122,158,138,.15);border-radius:12px;padding:14px;margin-top:6px;font-size:13px;line-height:1.7;color:var(--text-dim);min-height:60px;}
.ai-insight.loading{color:var(--text-faint);font-style:italic;}

/* CENTERING OVERLAY */
#co{display:none;position:fixed;inset:0;z-index:200;background:radial-gradient(ellipse at 50% 35%,#0a1e10 0%,#030a05 100%);flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
#co.active{display:flex;}
.co-close{position:absolute;top:calc(var(--safe-top) + 16px);right:18px;background:none;border:none;color:var(--text-faint);font-size:26px;cursor:pointer;padding:8px;line-height:1;}
.co-title{font-family:'DM Serif Display',serif;font-size:30px;color:var(--text);margin-bottom:5px;text-align:center;}
.co-sub{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--green);margin-bottom:40px;text-align:center;}
.ring-wrap{position:relative;width:200px;height:200px;margin-bottom:32px;}
.ring-wrap svg{width:200px;height:200px;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(255,255,255,.05);stroke-width:10;}
.ring-prog{fill:none;stroke:var(--green);stroke-width:10;stroke-linecap:round;stroke-dasharray:565;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .6s;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-time{font-family:'DM Serif Display',serif;font-size:46px;color:var(--text);line-height:1;}
.ring-phase{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--green);margin-top:6px;transition:color .5s;}
.breath-instr{font-size:14px;color:var(--text-dim);text-align:center;line-height:1.9;margin-bottom:32px;min-height:54px;transition:opacity .3s;white-space:pre-line;}
.co-btn{padding:14px 44px;border-radius:50px;background:linear-gradient(135deg,rgba(122,158,138,.2),rgba(122,158,138,.07));border:1px solid rgba(122,158,138,.3);color:var(--text);font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.co-btn.complete{background:linear-gradient(135deg,rgba(122,158,138,.3),rgba(184,148,96,.15));border-color:rgba(122,158,138,.5);color:var(--green-light);}
.co-done-msg{font-size:12px;color:var(--green);text-align:center;margin-top:14px;min-height:20px;letter-spacing:1px;}
</style>
</head>
<body>

<!-- CENTERING OVERLAY -->
<div id="co">
  <button class="co-close" onclick="closeCenter()">✕</button>
  <div class="co-title">🌿 Centering</div>
  <div class="co-sub">2 minutes · come back to yourself</div>
  <div class="ring-wrap">
    <svg viewBox="0 0 200 200">
      <circle class="ring-bg" cx="100" cy="100" r="90"/>
      <circle class="ring-prog" id="ring-prog" cx="100" cy="100" r="90"/>
    </svg>
    <div class="ring-center">
      <div class="ring-time" id="ring-time">2:00</div>
      <div class="ring-phase" id="ring-phase">ready</div>
    </div>
  </div>
  <div class="breath-instr" id="breath-instr">Find a comfortable position.\nTap Start when you're ready.</div>
  <button class="co-btn" id="co-btn" onclick="centerAction()">Start</button>
  <div class="co-done-msg" id="co-done-msg"></div>
</div>

<!-- APP -->
<div id="header">
  <div class="eyebrow">Daily Check-In</div>
  <div class="date-label" id="date-label">—</div>
  <div class="stat-row">
    <div class="stat-card">
      <span class="num" id="stat-nn">0/9</span>
      <div class="lbl">Non-Neg</div>
    </div>
    <div class="stat-card gold">
      <span class="num" id="stat-goals">0/5</span>
      <div class="lbl">Goals</div>
    </div>
    <div class="stat-card orange">
      <span class="num" id="stat-anger">0/3</span>
      <div class="lbl">Anger Med</div>
    </div>
  </div>
</div>

<div id="tabs">
  <button class="active" onclick="switchTab('today')">Today</button>
  <button onclick="switchTab('history')">History</button>
  <button onclick="switchTab('week')">Week</button>
</div>

<!-- TODAY -->
<div id="view-today" class="view active">

  <button class="center-launch" onclick="openCenter()">
    <div class="cl-icon">🌿</div>
    <div class="cl-text">
      <div class="cl-title">Start 2-min Centering</div>
      <div class="cl-sub" id="cl-sub">Tap to begin your session</div>
    </div>
    <div class="cl-arrow">▶</div>
  </button>

  <div class="section">
    <div class="section-head">
      <div class="section-title">Non-Negotiables</div>
      <div class="section-sub">Must happen every day</div>
    </div>
    <div class="section-body" id="nn-list"></div>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-title">Weekly</div>
      <div class="section-sub" id="anger-sub">Anger meditation — 0/3 this week</div>
    </div>
    <div class="section-body">
      <button class="check-row" id="row-anger" onclick="toggleNN('anger_med')">
        <div class="check-box" id="box-anger"></div>
        <span class="check-icon">🔥</span>
        <span class="check-label">Anger meditation</span>
      </button>
      <div class="anger-pips">
        <div class="pip" id="pip0"></div><div class="pip" id="pip1"></div><div class="pip" id="pip2"></div>
        <span class="pip-label" id="pip-label"></span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-title gold">Daily Goals</div>
      <div class="section-sub">Aim for these — no pressure</div>
    </div>
    <div class="section-body" id="goals-list"></div>
  </div>

  <button class="save-btn" id="save-btn" onclick="handleSave()">Save Check-In</button>
</div>

<!-- HISTORY -->
<div id="view-history" class="view"><div id="history-list"></div></div>

<!-- WEEK -->
<div id="view-week" class="view">
  <div class="week-nav">
    <button onclick="changeWeek(-1)">←</button>
    <span class="week-label" id="week-range-label">This week</span>
    <button onclick="changeWeek(1)">→</button>
  </div>
  <div id="week-content"></div>
</div>

<script>
const DAILY_NN=[
  {id:"wakeup",     label:"Wake up by 6:30am",     icon:"⏰"},
  {id:"calendar",   label:"Check calendar + tasks", icon:"📅"},
  {id:"core",       label:"Core workout (10 min)",  icon:"💪"},
  {id:"stretch",    label:"Stretching (15 min)",    icon:"🤸"},
  {id:"med_morning",label:"Morning meditation",     icon:"🌅"},
  {id:"med_evening",label:"Evening meditation",     icon:"🌙"},
  {id:"centering1", label:"Centering #1",           icon:"🌿"},
  {id:"centering2", label:"Centering #2",           icon:"🌿"},
  {id:"centering3", label:"Centering #3",           icon:"🌿"},
];

const DAILY_GOALS=[
  {id:"no_porn",  label:"No porn",                   icon:"🚫"},
  {id:"no_junk",  label:"No junk food",               icon:"🥗"},
  {id:"study",    label:"15 min study in office",    icon:"📖"},
  {id:"cycling",  label:"20 min cycling or workout", icon:"🚴"},
  {id:"journal",  label:"5 lines in daily journal",  icon:"✍️"},
];

let allData={}, weekOffset=0;

function loadAll(){try{allData=JSON.parse(localStorage.getItem("dt_data")||"{}");}catch{allData={};}}
function saveAll(){localStorage.setItem("dt_data",JSON.stringify(allData));}
function todayKey(){return new Date().toISOString().split("T")[0];}
function getDay(k){return allData[k]||{nn:{},goals:{}};}
function setDay(k,p){allData[k]={...getDay(k),...p};saveAll();}
function formatDate(s){return new Date(s+"T00:00:00").toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"});}
function formatShort(s){return new Date(s+"T00:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"short"});}

function getWeekDays(off=0){
  const now=new Date(),day=now.getDay(),diff=now.getDate()-day+(day===0?-6:1);
  const mon=new Date(now);mon.setDate(diff+off*7);mon.setHours(0,0,0,0);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().split("T")[0];});
}
function angerCountWeek(){return getWeekDays(0).filter(d=>allData[d]?.nn?.anger_med).length;}
function centerDoneToday(){const d=getDay(todayKey());return["centering1","centering2","centering3"].filter(id=>d.nn[id]).length;}

function render(){
  const today=todayKey(),data=getDay(today);
  document.getElementById("date-label").textContent=formatDate(today);

  const nnDone=DAILY_NN.filter(n=>data.nn[n.id]).length;
  const gDone=DAILY_GOALS.filter(g=>data.goals[g.id]).length;
  const anger=angerCountWeek();
  document.getElementById("stat-nn").textContent=`${nnDone}/${DAILY_NN.length}`;
  document.getElementById("stat-goals").textContent=`${gDone}/${DAILY_GOALS.length}`;
  document.getElementById("stat-anger").textContent=`${anger}/3`;

  const cDone=centerDoneToday();
  const cSubs=["Tap to begin your first centering today","1 done ✓ — 2 more today","2 done ✓ — one more today","All 3 done today ✓"];
  document.getElementById("cl-sub").textContent=cSubs[Math.min(cDone,3)];

  // non-negotiables
  document.getElementById("nn-list").innerHTML=DAILY_NN.map(item=>{
    const ch=!!data.nn[item.id];
    return`<button class="check-row${ch?" done":""}" onclick="toggleNN('${item.id}')">
      <div class="check-box${ch?" g":""}"><span>${ch?"✓":""}</span></div>
      <span class="check-icon">${item.icon}</span>
      <span class="check-label">${item.label}</span>
    </button>`;
  }).join("");

  // anger
  const ac=!!data.nn["anger_med"];
  document.getElementById("row-anger").className="check-row"+(ac?" done":"");
  const ab=document.getElementById("box-anger");
  ab.className="check-box"+(ac?" o":"");ab.innerHTML=ac?"✓":"";
  document.getElementById("anger-sub").textContent=`Anger meditation — ${anger}/3 this week`;
  for(let i=0;i<3;i++)document.getElementById("pip"+i).className="pip"+(i<anger?" filled":"");
  document.getElementById("pip-label").textContent=(3-anger)>0?`${3-anger} more needed`:"✓ Done for the week!";

  // goals
  document.getElementById("goals-list").innerHTML=DAILY_GOALS.map(item=>{
    const ch=!!data.goals[item.id];
    return`<button class="check-row${ch?" done":""}" onclick="toggleGoal('${item.id}')">
      <div class="check-box${ch?" gd":""}"><span>${ch?"✓":""}</span></div>
      <span class="check-icon">${item.icon}</span>
      <span class="check-label">${item.label}</span>
    </button>`;
  }).join("");
}

function toggleNN(id){
  const t=todayKey(),d=getDay(t),nn={...d.nn,[id]:!d.nn[id]};
  setDay(t,{nn});render();
}
function toggleGoal(id){
  const t=todayKey(),d=getDay(t),goals={...d.goals,[id]:!d.goals[id]};
  setDay(t,{goals});render();
}

function handleSave(){
  const b=document.getElementById("save-btn");
  b.textContent="✓ Saved";b.classList.add("saved");
  setTimeout(()=>{b.textContent="Save Check-In";b.classList.remove("saved");},2000);
}

function switchTab(tab){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("view-"+tab).classList.add("active");
  ["today","history","week"].forEach((t,i)=>{if(t===tab)document.querySelectorAll("#tabs button")[i].classList.add("active");});
  if(tab==="history")renderHistory();
  if(tab==="week")renderWeekReport(weekOffset);
}

function renderHistory(){
  const days=Object.keys(allData).sort((a,b)=>b.localeCompare(a)).slice(0,21);
  const list=document.getElementById("history-list");
  if(!days.length){list.innerHTML=`<div class="empty-state">No history yet.<br>Complete your first check-in!</div>`;return;}
  list.innerHTML=days.map(day=>{
    const d=allData[day];
    const nn=DAILY_NN.filter(n=>d.nn?.[n.id]).length;
    const g=DAILY_GOALS.filter(g=>d.goals?.[g.id]).length;
    return`<div class="history-card">
      <div class="history-top">
        <div>
          <div class="history-date">${formatDate(day)}</div>
          <div class="history-sub">${nn}/${DAILY_NN.length} non-neg · ${g}/${DAILY_GOALS.length} goals${d.nn?.anger_med?" · 🔥":""}</div>
        </div>
        <div style="font-size:22px;">${nn===DAILY_NN.length?"🌟":nn>=7?"✅":"🌿"}</div>
      </div>
    </div>`;
  }).join("");
}

function changeWeek(dir){weekOffset+=dir;if(weekOffset>0)weekOffset=0;renderWeekReport(weekOffset);}

async function renderWeekReport(off){
  const days=getWeekDays(off),mon=days[0],sun=days[6];
  document.getElementById("week-range-label").textContent=off===0?"This week":`${formatShort(mon)} – ${formatShort(sun)}`;
  const content=document.getElementById("week-content");
  const wd=days.map(d=>({date:d,...getDay(d)}));
  const dwd=wd.filter(d=>Object.keys(d.nn||{}).length>0||Object.keys(d.goals||{}).length>0);
  if(!dwd.length){content.innerHTML=`<div class="empty-state">No data for this week yet.<br>Check in daily and come back Sunday!</div>`;return;}

  const nnR=DAILY_NN.map(item=>{const c=wd.filter(d=>d.nn?.[item.id]).length;return{label:item.label,icon:item.icon,c,pct:Math.round(c/7*100)};});
  const gR=DAILY_GOALS.map(item=>{const c=wd.filter(d=>d.goals?.[item.id]).length;return{label:item.label,icon:item.icon,c,pct:Math.round(c/7*100)};});
  const ac=wd.filter(d=>d.nn?.anger_med).length;
  const tot=nnR.reduce((a,b)=>a+b.c,0);
  const ovr=Math.round(tot/(DAILY_NN.length*7)*100);

  function bars(items,colorClass=""){return items.map(item=>{
    const cls=item.pct>=70?(colorClass||""):(item.pct>=40?" mid":" low");
    return`<div class="bar-row"><div class="bar-label">${item.icon} ${item.label}</div><div class="bar-track"><div class="bar-fill${cls}" style="width:${item.pct}%"></div></div><div class="bar-pct">${item.pct}%</div></div>`;
  }).join("");}

  content.innerHTML=`
    <div class="report-header">Week Review</div>
    <div class="report-range">${formatShort(mon).toUpperCase()} — ${formatShort(sun).toUpperCase()}</div>
    <div class="report-score-ring" style="--pct:${ovr}"><div class="report-score-inner"><div class="report-score-num">${ovr}%</div><div class="report-score-lbl">overall</div></div></div>

    <div class="report-section">
      <div class="report-section-title">Non-Negotiables</div>
      ${bars(nnR)}
      <div class="bar-row" style="margin-top:8px;">
        <div class="bar-label">🔥 Anger meditation</div>
        <div class="bar-track"><div class="bar-fill${ac>=3?"":" mid"}" style="width:${Math.round(ac/3*100)}%"></div></div>
        <div class="bar-pct">${ac}/3</div>
      </div>
    </div>

    <div class="report-section">
      <div class="report-section-title">Daily Goals</div>
      ${bars(gR," gold")}
    </div>

    <div class="report-section">
      <div class="report-section-title">AI Analysis</div>
      <div class="ai-insight loading" id="ai-box">Generating your weekly insights…</div>
    </div>`;

  genInsight(nnR,gR,ac,ovr,dwd.length);
}

async function genInsight(nnR,gR,ac,ovr,daysTracked){
  const box=document.getElementById("ai-box");if(!box)return;
  const strong=nnR.filter(n=>n.pct>=80).map(n=>n.label);
  const slipped=nnR.filter(n=>n.pct<50).map(n=>n.label);
  const topG=gR.filter(g=>g.pct>=60).map(g=>g.label);
  const missedG=gR.filter(g=>g.pct<30).map(g=>g.label);
  const prompt=`You are a warm, direct personal coach. Give a plain honest 3-4 sentence weekly analysis. No fluff. Be specific.\n\nWeek:\n- Non-negotiable completion: ${ovr}%\n- Days tracked: ${daysTracked}/7\n- Strong non-neg (80%+): ${strong.length?strong.join(", "):"none"}\n- Struggled non-neg (<50%): ${slipped.length?slipped.join(", "):"none"}\n- Anger meditation: ${ac}/3\n- Goals hit (60%+): ${topG.length?topG.join(", "):"none"}\n- Goals missed (<30%): ${missedG.length?missedG.join(", "):"none"}\n\nWrite 3-4 sentences: what went well, what slipped, one focus for next week. No headers, no bullets. Speak directly.`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    const t=d.content?.find(c=>c.type==="text")?.text||"";
    box.textContent=t||"Could not generate analysis.";box.classList.remove("loading");
  }catch{box.textContent="Open in Claude artifact to enable AI insights.";box.classList.remove("loading");}
}

// ── CENTERING TIMER ───────────────────────────────────────────────
const CIRC=565,TOTAL=120;
const PHASES=[
  {label:"Breathe in", dur:4,color:"var(--green)",      instr:"Breathe in slowly…\nFill your lungs completely."},
  {label:"Hold",       dur:4,color:"var(--green-light)",instr:"Hold gently.\nStay present."},
  {label:"Breathe out",dur:6,color:"var(--gold)",       instr:"Breathe out fully…\nLet everything go."},
  {label:"Pause",      dur:2,color:"var(--text-dim)",   instr:"Pause.\nNotice the stillness."},
];
let tInterval=null,tRunning=false,tDone=false,secsLeft=TOTAL,pIdx=0,pSecs=PHASES[0].dur;

function openCenter(){resetTimer();document.getElementById("co").classList.add("active");document.body.style.overflow="hidden";}
function closeCenter(){stopTimer();document.getElementById("co").classList.remove("active");document.body.style.overflow="";}
function stopTimer(){if(tInterval){clearInterval(tInterval);tInterval=null;}}

function resetTimer(){
  stopTimer();tRunning=false;tDone=false;secsLeft=TOTAL;pIdx=0;pSecs=PHASES[0].dur;
  document.getElementById("ring-time").textContent="2:00";
  document.getElementById("ring-prog").style.strokeDashoffset="0";
  document.getElementById("ring-prog").style.stroke="var(--green)";
  document.getElementById("ring-phase").textContent="ready";
  document.getElementById("ring-phase").style.color="var(--green)";
  document.getElementById("breath-instr").textContent="Find a comfortable position.\nTap Start when you're ready.";
  document.getElementById("co-btn").textContent="Start";
  document.getElementById("co-btn").className="co-btn";
  document.getElementById("co-done-msg").textContent="";
}

function updateRing(){
  const m=Math.floor(secsLeft/60),s=secsLeft%60;
  document.getElementById("ring-time").textContent=`${m}:${s.toString().padStart(2,"0")}`;
  document.getElementById("ring-prog").style.strokeDashoffset=CIRC*((TOTAL-secsLeft)/TOTAL);
}

function tickBreath(){
  pSecs--;
  if(pSecs<=0){
    pIdx=(pIdx+1)%PHASES.length;pSecs=PHASES[pIdx].dur;
    const ph=PHASES[pIdx];
    document.getElementById("ring-phase").textContent=ph.label;
    document.getElementById("ring-phase").style.color=ph.color;
    document.getElementById("ring-prog").style.stroke=ph.color;
    document.getElementById("breath-instr").style.opacity="0";
    setTimeout(()=>{document.getElementById("breath-instr").textContent=ph.instr;document.getElementById("breath-instr").style.opacity="1";},300);
  }
}

function centerAction(){
  if(tDone){markNextCentering();closeCenter();return;}
  if(!tRunning){
    tRunning=true;
    const ph=PHASES[0];
    document.getElementById("ring-phase").textContent=ph.label;
    document.getElementById("ring-phase").style.color=ph.color;
    document.getElementById("ring-prog").style.stroke=ph.color;
    document.getElementById("breath-instr").textContent=ph.instr;
    document.getElementById("co-btn").textContent="Pause";
    tInterval=setInterval(()=>{
      secsLeft--;tickBreath();updateRing();
      if(secsLeft<=0){
        clearInterval(tInterval);tRunning=false;tDone=true;
        document.getElementById("ring-phase").textContent="done ✓";
        document.getElementById("ring-phase").style.color="var(--green-light)";
        document.getElementById("breath-instr").textContent="Well done.\nTake a moment before you continue.";
        document.getElementById("co-btn").textContent="Mark Done & Close";
        document.getElementById("co-btn").className="co-btn complete";
        document.getElementById("co-done-msg").textContent="🌿 Centering complete";
      }
    },1000);
  }else{
    stopTimer();tRunning=false;
    document.getElementById("co-btn").textContent="Resume";
  }
}

function markNextCentering(){
  const t=todayKey(),d=getDay(t);
  const next=["centering1","centering2","centering3"].find(id=>!d.nn[id]);
  if(next){setDay(t,{nn:{...d.nn,[next]:true}});render();}
}

loadAll();
render();
</script>
